{% assign item = include.item %}
<div class="flex flex-col gap-6 sm:gap-8">
  <div class="grid sm:grid-cols-[90px_220px_1fr]">
    <p class="text-cool-gray sm:text-lg pr-4">{{ item.year }}</p>
    <a href="{{ item.permalink }}" class="styled-link text-xl sm:text-xl pr-6 pb-5 h-fit">
      {{ item.title }}
    </a>
    <div class="flex flex-col gap-4 sm:text-lg">
      <p>{{ item.description }}</p>
      <p class="text-cool-gray">{{ item.type }}: {{ item.tech }}</p>
    </div>
  </div>
  <img src="{{ item.image.src }}" alt="{{ item.image.alt }}" class="aspect-[21/9] object-cover">
</div>
